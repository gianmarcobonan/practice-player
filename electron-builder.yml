appId: com.gianmarco.practiceplayer
productName: Practice Player
copyright: Copyright (c) 2026 Gianmarco Bonan

directories:
  output: dist
  buildResources: build

# Associate .ppx project files with the app: the NSIS installer registers the
# extension on Windows (double-click opens Practice Player); on Linux it adds a
# MIME type + desktop entry. The app receives the path on the command line and
# auto-loads it (see fileArg/second-instance in src/main/main.js).
fileAssociations:
  - ext: ppx
    name: Practice Player Project
    description: Progetto Practice Player
    role: Editor

files:
  - src/**/*
  - package.json
  - "!**/*.map"
  - "!src/renderer/app/**"
  - "!src/renderer/worklet/**"

# onnxruntime-node ships native binaries that must live outside the asar.
asarUnpack:
  - "**/node_modules/onnxruntime-node/**"

# Native binaries and AI models are shipped unpacked next to the app, not inside the asar.
extraResources:
  - from: bin
    to: bin
    filter: ["**/*"]
  - from: models
    to: models
    filter: ["**/*"]

win:
  target:
    - target: nsis      # installer (supports auto-update)
  # Avoid winCodeSign (its archive contains macOS symlinks that fail to extract
  # on Windows without admin/Developer Mode). We don't sign for personal use.
  signAndEditExecutable: false

# Per-user one-click installer: no admin rights, creates shortcuts, supports
# silent auto-update via electron-updater.
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Practice Player
  artifactName: PracticePlayer-Setup-${version}.exe

# Linux: AppImage is the format electron-updater can self-update (like the NSIS
# installer on Windows). Built on an Ubuntu CI runner.
linux:
  target:
    - target: AppImage
  category: AudioVideo
  artifactName: PracticePlayer-${version}.AppImage

# Publishing is configured only for the `release` script / CI (via
# -c.publish.provider=github), where owner/repo are auto-detected from the git
# remote. Keeping it out of this file lets local `npm run build` succeed without
# any repo info (and without generating an update feed).

# Body of the published GitHub Release (download instructions, same for every
# version). electron-builder reads this file and puts it in the release notes.
releaseInfo:
  releaseNotesFile: RELEASE_NOTES.md

# We have not configured code signing (personal use).
forceCodeSigning: false
