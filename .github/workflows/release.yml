name: Release

# Build + publish a GitHub Release whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # let electron-builder create the release & upload assets

jobs:
  build:
    # Windows builds the NSIS installer, Ubuntu builds the Linux AppImage,
    # macOS builds x64+arm64 DMGs (unsigned — Gatekeeper will show the "app not
    # verified" prompt; users open via right-click → Open).
    # All runners publish their assets (+ latest*.yml) to the same release.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch native binaries (ffmpeg, yt-dlp)
        run: node scripts/fetch-binaries.mjs

      # Runner macOS-latest e' arm64 e non ha Rosetta preinstallato:
      # servira' allo smoke test per eseguire ffmpeg x64.
      - name: Install Rosetta 2 (macOS only)
        if: runner.os == 'macOS'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Build and publish release
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Smoke test dei DMG: verifica struttura del bundle, architettura e
      # avvio effettivo di ffmpeg/yt-dlp. Gira DOPO la publish: se fallisce,
      # il workflow diventa rosso e la release va rimossa a mano.
      - name: Smoke test macOS DMGs
        if: runner.os == 'macOS'
        run: bash scripts/smoke-test-mac.sh dist
