name: Release

# Build + publish a GitHub Release whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # let electron-builder create the release & upload assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch native binaries (ffmpeg, yt-dlp)
        run: node scripts/fetch-binaries.mjs

      - name: Build installer + portable and publish release
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
